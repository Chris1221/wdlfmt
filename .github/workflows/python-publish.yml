# Uploads the package to PyPI. Called by release-please.yml when a release is created.
name: Publish to PyPI

on:
  workflow_call:

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/wdlfmt
    permissions:
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Install Pixi
      run: |
        curl -fsSL https://pixi.sh/install.sh | bash
        echo "$HOME/.pixi/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: pixi install

    - name: Build package
      run: pixi run python -m build

    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        attestations: false
