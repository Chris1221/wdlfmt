name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - uses: prefix-dev/setup-pixi@v0.8.0
      with:
        pixi-version: v0.41.4
    - name: Lint
      run: pixi run lint
    - name: Test
      run: pixi run test
